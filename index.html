<style>
  :root{
    --bg:#f6f6f7; --panel:#ffffff; --rail:#0f1115; --rail-2:#1a1d23;
    --line:#ececed; --line-2:#e0e0e2;
    --ink:#17171a; --ink-2:#55555e; --ink-3:#8a8a93;
    --accent:#5b5bd6; --accent-weak:#eeeefc; --accent-ink:#3a34c4;
    --green:#2f9e6b; --green-w:#e8f6ef; --amber:#c98a1a; --amber-w:#fbf1df; --red:#d64a4a; --red-w:#fbecec;
    --blue:#3d7fe0; --blue-w:#e9f1fc; --violet:#8b5cf6; --gray:#9aa0aa;
    --r:14px; --r-sm:9px; --tap:2.75rem;
    --sh:0 1px 2px rgba(16,17,21,.04),0 2px 6px rgba(16,17,21,.05);
    --sh-2:0 8px 30px rgba(16,17,21,.14);
    --font:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font);background:#d7d8da;color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.4;}
  button{font-family:inherit;cursor:pointer;color:inherit;}
  h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-.01em;}

  /* preview chrome */
  .chrome{display:flex;align-items:center;gap:1rem;justify-content:space-between;padding:.55rem 1rem;background:#0f1115;color:#e9e9ee;flex-wrap:wrap;}
  .chrome .b{display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.9rem;}
  .chrome .b .d{width:.6rem;height:.6rem;border-radius:50%;background:#7c7cf0;}
  .seg{display:inline-flex;background:#23252c;border-radius:2rem;padding:.2rem;}
  .seg button{border:0;background:transparent;color:#a9a9b6;padding:.4rem 1rem;border-radius:2rem;font-size:.8rem;font-weight:600;min-height:2.4rem;}
  .seg button.on{background:#e9e9ee;color:#17171a;}
  .chrome .h{font-size:.72rem;color:#8b8b98;flex-basis:100%;}

  .stagewrap{display:flex;justify-content:center;padding:.5rem;min-height:calc(100vh - 58px);}
  .device{background:var(--bg);overflow:hidden;box-shadow:var(--sh-2);position:relative;}
  .device.desktop{width:100%;max-width:1720px;border-radius:14px;height:calc(100vh - 70px);}
  .device.mobile{width:390px;max-width:100%;border-radius:30px;border:11px solid #0d0f13;height:800px;}
  .app{display:flex;height:100%;min-height:0;position:relative;}

  /* ---------- left rail (desktop) ---------- */
  .rail{width:74px;background:var(--rail);flex:0 0 74px;display:flex;flex-direction:column;align-items:center;padding:.9rem 0;gap:.35rem;}
  .rail .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,#6d6df3,#8b5cf6);display:grid;place-items:center;color:#fff;font-weight:700;margin-bottom:.7rem;}
  .rail button{width:52px;height:52px;border:0;background:transparent;border-radius:11px;color:#8b8d98;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.55rem;font-weight:600;}
  .rail button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;}
  .rail button.on{background:var(--rail-2);color:#fff;}
  .rail button:hover{color:#dcdce4;}

  .main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}

  /* ---------- top nav ---------- */
  .topnav{background:var(--panel);border-bottom:1px solid var(--line);padding:.6rem .9rem;display:flex;flex-direction:column;gap:.6rem;}
  .topnav .row1{display:flex;align-items:center;gap:.6rem;}
  .boardtitle{font-size:1.05rem;font-weight:650;}
  .boardtitle small{display:block;font-size:.72rem;color:var(--ink-3);font-weight:500;letter-spacing:0;}
  .search{flex:1;max-width:340px;display:flex;align-items:center;gap:.5rem;background:var(--bg);border:1px solid var(--line-2);border-radius:10px;padding:.5rem .7rem;}
  .search input{border:0;background:transparent;outline:none;width:100%;font-size:14px;color:var(--ink);}
  .search svg{width:15px;height:15px;stroke:var(--ink-3);fill:none;stroke-width:2;}
  .spacer{flex:1;}
  .roleTog{display:inline-flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;}
  .roleTog button{border:0;background:var(--panel);padding:.45rem .7rem;font-size:.76rem;font-weight:600;color:var(--ink-2);min-height:2.3rem;}
  .roleTog button.on{background:var(--accent);color:#fff;}
  .row2{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:.35rem;border:1px solid var(--line-2);background:var(--panel);border-radius:8px;padding:.35rem .6rem;font-size:.76rem;color:var(--ink-2);font-weight:500;min-height:2.1rem;}
  .chip.disabled{opacity:.55;}
  .chip.active{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-weak);}
  .chip.ms{position:relative;cursor:pointer;}
  .ms-sum{font-weight:600;color:var(--ink);} .chip.ms.active .ms-sum{color:var(--accent-ink);}
  .ms-car{color:var(--ink-3);font-size:.65rem;margin-left:.1rem;}
  .ms-pop{position:absolute;top:calc(100% + 6px);left:0;min-width:190px;max-height:300px;overflow-y:auto;background:var(--panel);border:1px solid var(--line-2);border-radius:11px;box-shadow:var(--sh-2);z-index:60;padding:.35rem;display:none;cursor:default;}
  .ms-pop.show{display:block;}
  .ms-grp{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);padding:.45rem .5rem .2rem;}
  .ms-opt{display:flex;align-items:center;gap:.55rem;padding:.4rem .5rem;border-radius:7px;font-size:.83rem;color:var(--ink);cursor:pointer;min-height:2.1rem;font-weight:500;}
  .ms-opt:hover{background:var(--bg);}
  .ms-opt input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;}
  .ms-all{width:100%;text-align:left;background:transparent;border:0;border-bottom:1px solid var(--line);padding:.5rem;font-size:.78rem;font-weight:700;color:var(--accent-ink);cursor:pointer;margin-bottom:.25rem;}
  .ms-all:hover{background:var(--bg);}
  .chip svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
  .chip select{border:0;background:transparent;font:inherit;color:inherit;font-weight:600;outline:none;}

  /* ---------- board area ---------- */
  .surface{flex:1;min-height:0;overflow:auto;}
  .board{display:flex;gap:.7rem;padding:.9rem;align-items:flex-start;height:100%;overflow-x:auto;}
  .col{flex:0 0 258px;display:flex;flex-direction:column;max-height:100%;}
  .col.collapsed{flex:0 0 190px;}
  .col.collapsed .col-h .nm{color:var(--ink-3);}
  .expandbtn{width:100%;border:1px dashed var(--line-2);background:var(--panel);border-radius:10px;padding:.7rem;font-size:.78rem;font-weight:600;color:var(--accent-ink);min-height:2.6rem;}
  .expandbtn:hover{border-style:solid;border-color:var(--accent);background:var(--accent-weak);}
  .collapsebtn{width:100%;border:0;background:transparent;color:var(--ink-3);font-size:.72rem;font-weight:600;padding:.3rem;min-height:1.9rem;margin-bottom:.3rem;}
  .col-h{display:flex;align-items:center;gap:.45rem;padding:.15rem .3rem .55rem;}
  .col-h .dot{width:.55rem;height:.55rem;border-radius:50%;}
  .col-h .nm{font-size:.82rem;font-weight:650;color:var(--ink);}
  .col-h .ct{margin-left:auto;font-size:.72rem;color:var(--ink-3);font-weight:600;background:var(--bg);border:1px solid var(--line);border-radius:1rem;padding:0 .45rem;}
  .col-h .auto{font-size:.6rem;font-weight:700;color:var(--accent-ink);background:var(--accent-weak);padding:.05rem .35rem;border-radius:1rem;letter-spacing:.02em;}
  .colinfo{width:1.15rem;height:1.15rem;border-radius:50%;border:1px solid var(--line-2);background:var(--panel);color:var(--ink-3);font-size:.62rem;font-weight:800;font-style:italic;font-family:Georgia,serif;display:grid;place-items:center;flex:0 0 auto;margin-left:.15rem;}
  .colinfo:hover{border-color:var(--accent);color:var(--accent-ink);}
  .col-tag{font-size:.68rem;color:var(--ink-3);font-weight:600;padding:0 .3rem .5rem;margin-top:-.3rem;}
  .col-empty{font-size:.74rem;color:var(--ink-3);text-align:center;padding:1.2rem .5rem;border:1px dashed var(--line-2);border-radius:10px;}
  .sigs{gap:.3rem;flex-wrap:wrap;}
  .sig{font-size:.62rem;font-weight:700;padding:.08rem .4rem;border-radius:1rem;}
  .sig.near{background:var(--blue-w);color:#2f6ac4;} .sig.eng{background:var(--bg);color:var(--ink-2);border:1px solid var(--line-2);} .sig.fruit{background:var(--green-w);color:#1f7d54;}
  .nudge{font-size:.72rem;font-weight:600;margin-top:.5rem;padding:.35rem .5rem;border-radius:8px;line-height:1.3;}
  .nudge.hot{background:#fff1e8;color:#b3541e;border:1px solid #f6d3bd;}
  .nudge.bad{background:var(--red-w);color:#b23636;}
  .nudge.tip{background:var(--accent-weak);color:var(--accent-ink);}
  .mob-help{display:flex;align-items:center;gap:.4rem;background:var(--accent-weak);border:1px solid #dcdcfa;border-radius:9px;padding:.4rem .6rem;margin-bottom:.7rem;font-size:.76rem;font-weight:600;color:var(--accent-ink);}
  .mob-help span{flex:1;} .mob-help .colinfo{background:#fff;}
  /* info modal */
  .info-what{font-size:.92rem;font-weight:650;line-height:1.45;color:var(--ink);margin-bottom:.9rem;}
  .info-dolabel{font-size:.72rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:.4rem;}
  .info-steps{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:.5rem;}
  .info-steps li{position:relative;padding-left:1.4rem;font-size:.86rem;line-height:1.4;color:var(--ink-2);}
  .info-steps li:before{content:'→';position:absolute;left:0;top:0;color:var(--accent);font-weight:800;}
  /* activity list modal */
  .actlist{display:flex;flex-direction:column;}
  .actrow{display:flex;align-items:center;justify-content:space-between;gap:.6rem;padding:.55rem 0;border-bottom:1px solid var(--line);}
  .actrow:last-child{border-bottom:0;}
  .actrow .an{font-size:.86rem;font-weight:650;} .actrow .as{font-size:.76rem;color:var(--ink-2);margin-top:.1rem;}
  .actrow .ad{font-size:.76rem;color:var(--ink-3);white-space:nowrap;}
  .bar-row.click,.mbar.click{cursor:pointer;} .bar-row.click:hover .bl{color:var(--accent-ink);text-decoration:underline;}
  .mbar.click:hover i{filter:brightness(1.08);}
  /* search suggestions */
  .search{position:relative;}
  .search-sug{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--sh-2);z-index:60;overflow:hidden;display:none;}
  .search-sug.show{display:block;}
  .sug-row{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.6rem;background:transparent;border:0;border-bottom:1px solid var(--line);padding:.6rem .8rem;text-align:left;cursor:pointer;min-height:2.6rem;}
  .sug-row:last-child{border-bottom:0;} .sug-row:hover{background:var(--bg);}
  .sug-tx{display:flex;flex-direction:column;} .sug-tx b{font-size:.84rem;} .sug-tx span{font-size:.74rem;color:var(--ink-3);}
  .sug-sec{font-size:.64rem;font-weight:700;color:var(--accent-ink);background:var(--accent-weak);border-radius:1rem;padding:.15rem .5rem;white-space:nowrap;}
  .sug-empty{padding:.7rem .8rem;font-size:.8rem;color:var(--ink-3);}
  /* my notes */
  .mynote{min-height:4.5rem;border:1px solid var(--line-2);border-radius:10px;padding:.55rem .7rem;font-size:.85rem;line-height:1.45;color:var(--ink);outline:none;white-space:pre-wrap;}
  .mynote:empty:before{content:attr(data-ph);color:var(--ink-3);}
  .mynote:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak);}
  .note-hint{font-size:.7rem;color:var(--ink-3);margin-top:.4rem;}
  .col-body{background:transparent;border-radius:12px;padding:2px;display:flex;flex-direction:column;gap:.55rem;overflow-y:auto;flex:1;min-height:60px;}
  .col.dropok .col-body{outline:2px dashed var(--accent);outline-offset:2px;background:var(--accent-weak);border-radius:12px;}
  .swimhead{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);padding:.4rem .2rem .1rem;display:flex;align-items:center;gap:.35rem;}
  .swimhead .s{width:.5rem;height:.5rem;border-radius:2px;}

  /* ---------- card ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);padding:.65rem .7rem;position:relative;}
  .card:hover{border-color:var(--line-2);}
  .card[draggable=true]{cursor:pointer;}
  .card.dragging{opacity:.35;}
  .card .who{font-size:.9rem;font-weight:650;line-height:1.15;}
  .card .where{font-size:.78rem;color:var(--ink-2);margin-top:.05rem;}
  .card .row{display:flex;align-items:center;gap:.4rem;margin-top:.5rem;flex-wrap:wrap;}
  .starbtn{font-size:1.05rem;line-height:1;padding:0 .2rem;border:0;background:transparent;color:#c3c6cc;cursor:pointer;border-radius:6px;}
  .starbtn.on{color:#e0a11a;} .starbtn:hover{color:#e0a11a;}
  .starbtn.lg{font-size:.8rem;font-weight:700;padding:.25rem .5rem;border:1px solid var(--line-2);color:var(--ink-2);margin:0;}
  .starbtn.lg.on{color:#9a6a12;background:var(--amber-w);border-color:transparent;}
  .badge{font-size:.62rem;font-weight:650;padding:.08rem .4rem;border-radius:1rem;background:var(--bg);color:var(--ink-2);border:1px solid var(--line-2);display:inline-flex;align-items:center;gap:.2rem;}
  .badge.of{background:var(--blue-w);color:#2f6ac4;border-color:#cfe0f7;}
  .badge.ofv{background:var(--green-w);color:#1f7d54;border-color:#c3e8d5;}
  .next{font-size:.75rem;color:var(--ink-2);margin-top:.5rem;display:flex;align-items:center;gap:.35rem;}
  .next svg{width:12px;height:12px;stroke:var(--accent);fill:none;stroke-width:2;flex:0 0 auto;}
  .next b{color:var(--ink);font-weight:600;}
  .owner{position:absolute;top:.6rem;right:.6rem;width:1.55rem;height:1.55rem;border-radius:50%;display:grid;place-items:center;font-size:.6rem;font-weight:700;color:#fff;}
  .owner.AE{background:#0b8b7f;} .owner.ISP{background:#7c53e0;} .owner.RSM{background:#c98a1a;} .owner.CX{background:#2f9e6b;}
  .segb{font-size:.66rem;font-weight:800;padding:.12rem .45rem;border-radius:6px;color:#fff;letter-spacing:.02em;}
  .seg1{background:#4a45c9;} .seg2{background:#3d7fe0;} .seg3{background:#c98a1a;} .seg4{background:#6b7280;} .seg5{background:#94a3b8;} .seg9{background:#c9c9c9;}
  .reasonb{font-size:.62rem;font-weight:700;padding:.08rem .4rem;border-radius:1rem;background:var(--accent-weak);color:var(--accent-ink);}
  /* discovery pill on card */
  .discopill{display:inline-flex;align-items:center;gap:.2rem;font-size:.63rem;font-weight:800;padding:.1rem .45rem;border-radius:1rem;}
  .discopill svg{width:11px;height:11px;fill:currentColor;stroke:none;}
  /* discovery panel section */
  .p-sec.disco .lbl svg{width:12px;height:12px;fill:var(--accent);stroke:none;vertical-align:-1px;margin-right:.2rem;}
  .disco-head{display:flex;align-items:center;gap:.8rem;background:linear-gradient(135deg,#f4f3ff,#eef4ff);border:1px solid #e2e0fb;border-radius:12px;padding:.75rem .8rem;margin-bottom:.7rem;}
  .ring-wrap{position:relative;width:58px;height:58px;flex:0 0 auto;}
  .ring{width:58px;height:58px;transform:rotate(-90deg);}
  .ring .bg{fill:none;stroke:#e3e1f5;stroke-width:4;}
  .ring .fg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dasharray .5s;}
  .ring-num{position:absolute;inset:0;display:grid;place-items:center;font-size:1.05rem;font-weight:800;color:var(--ink);}
  .disco-meta .score-lbl{font-size:.82rem;font-weight:700;}
  .disco-meta .score-sub{font-size:.68rem;color:var(--ink-3);margin:.1rem 0 .35rem;}
  .grade{font-size:.68rem;font-weight:800;padding:.12rem .5rem;border-radius:1rem;}
  .dims{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.7rem;}
  .dimrow{display:flex;align-items:center;gap:.5rem;}
  .dimrow .dn{font-size:.78rem;flex:1;color:var(--ink-2);}
  .dstate{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:.05rem .35rem;border-radius:1rem;flex:0 0 auto;}
  .dstate.complete{background:var(--green-w);color:#1f7d54;} .dstate.partial{background:var(--amber-w);color:#9a6a12;} .dstate.missing{background:var(--red-w);color:#b23636;}
  .dbar{width:52px;height:5px;border-radius:3px;background:#eee;overflow:hidden;flex:0 0 auto;}
  .dbar i{display:block;height:100%;background:var(--accent);border-radius:3px;}
  .ai-q{border:1px solid #e2e0fb;background:#faf9ff;border-radius:11px;padding:.6rem .7rem;margin-bottom:.6rem;}
  .ai-qh{font-size:.72rem;font-weight:800;color:var(--accent-ink);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem;}
  .ai-qh svg{width:12px;height:12px;fill:var(--accent);stroke:none;}
  .ai-qi{font-size:.8rem;color:var(--ink);padding:.2rem 0 .2rem .8rem;position:relative;}
  .ai-qi::before{content:'';position:absolute;left:.15rem;top:.62rem;width:5px;height:5px;border-radius:50%;background:var(--accent);}
  .ai-sum{font-size:.8rem;border-radius:10px;padding:.55rem .7rem;margin-bottom:.5rem;line-height:1.45;}
  .ai-sum b{font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:.2rem;}
  .ai-sum.learned{background:var(--green-w);} .ai-sum.learned b{color:#1f7d54;}
  .ai-sum.missing{background:var(--amber-w);} .ai-sum.missing b{color:#9a6a12;}
  .disco-rec{width:100%;margin-top:.5rem;gap:.4rem;}
  .exbox{margin-top:.8rem;border:1px solid #e2e0fb;background:#faf9ff;border-radius:11px;padding:.6rem .7rem;text-align:left;}
  .exhead{font-size:.72rem;font-weight:800;color:var(--accent-ink);display:flex;align-items:center;gap:.3rem;margin-bottom:.4rem;}
  .exhead svg{width:12px;height:12px;fill:var(--accent);stroke:none;}
  .exrow{font-size:.8rem;color:var(--ink);padding:.15rem 0;}
  .disco-lbl{display:flex;align-items:center;gap:.4rem;}
  .disc-help{margin-left:auto;font-size:.66rem;font-weight:700;color:var(--accent-ink);background:var(--accent-weak);border:0;border-radius:1rem;padding:.18rem .55rem;cursor:pointer;}
  .disc-help:hover{background:#e2e0fb;}
  .lnk{background:none;border:0;color:var(--accent-ink);font-size:.74rem;font-weight:600;cursor:pointer;padding:.3rem;margin-top:.4rem;text-decoration:underline;}
  .rubric-intro{font-size:.84rem;line-height:1.5;color:var(--ink-2);background:linear-gradient(135deg,#f4f3ff,#eef4ff);border:1px solid #e2e0fb;border-radius:11px;padding:.7rem .8rem;margin-bottom:.6rem;}
  .rubric-scale{font-size:.76rem;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:.5rem .7rem;margin-bottom:.8rem;line-height:1.5;}

  .jstep svg{width:15px;height:15px;fill:var(--accent);stroke:none;}
  .spin{width:14px;height:14px;border:2px solid var(--accent-weak);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .7s linear infinite;flex:0 0 auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .transcript{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:.5rem .65rem;font-size:.78rem;color:var(--ink-2);display:flex;flex-direction:column;gap:.3rem;max-height:120px;overflow-y:auto;}
  .tline{animation:fadein .3s ease;} .tline b{color:var(--ink);}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .exrow.reveal{animation:fadein .35s ease;}
  .scorejump{margin-top:.7rem;border-top:1px dashed var(--line-2);padding-top:.7rem;}
  .sj-row{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .sj-row .arrow{color:var(--ink-3);} .sj-row b{font-size:1.05rem;}
  .sj-grade{font-size:.68rem;font-weight:800;border-radius:1rem;padding:.1rem .5rem;margin-left:.2rem;}
  .sj-q{margin-top:.6rem;background:var(--accent-weak);border-radius:10px;padding:.55rem .7rem;animation:fadein .4s ease;}
  .sj-qh{font-size:.72rem;font-weight:800;color:var(--accent-ink);margin-bottom:.35rem;}
  .sj-qi{font-size:.8rem;color:var(--ink);margin:.15rem 0;}
  /* next activity */
  .na-ok{display:flex;align-items:center;gap:.3rem;font-size:.74rem;color:#1f7d54;margin-top:.5rem;font-weight:600;}
  .na-ok svg{width:12px;height:12px;stroke:#1f7d54;fill:none;stroke-width:2;flex:0 0 auto;}
  .na-miss{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;color:#b23636;background:var(--red-w);border:1px solid #f0c9c9;border-radius:1rem;padding:.15rem .5rem;margin-top:.5rem;font-weight:700;}
  .na-miss svg{width:12px;height:12px;fill:#b23636;stroke:none;}
  .na-warn{background:var(--red-w);border:1px solid #f0c9c9;border-radius:11px;padding:.6rem .7rem;}
  .na-warn .h{display:flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:800;color:#b23636;margin-bottom:.3rem;}
  .na-warn .h svg{width:13px;height:13px;fill:#b23636;stroke:none;}
  .na-warn p{margin:0 0 .55rem;font-size:.79rem;color:var(--ink-2);line-height:1.4;}
  .na-warn .btns{display:flex;gap:.5rem;}
  .na-warn .btns button{flex:1;min-height:2.4rem;border-radius:9px;font-size:.78rem;font-weight:700;border:1px solid var(--line-2);background:#fff;color:var(--ink);}
  .na-warn .btns .sched{background:var(--accent);border-color:var(--accent);color:#fff;}
  .cardacts{display:flex;gap:.35rem;margin-top:.55rem;}
  .card-open{margin-top:.5rem;font-size:.72rem;font-weight:600;color:var(--ink-3);display:flex;align-items:center;justify-content:flex-end;gap:.2rem;opacity:.65;}
  .card-open svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
  .card:hover .card-open{opacity:1;color:var(--accent-ink);}
  .cardacts button{flex:1;min-height:2.1rem;border:1px solid var(--line-2);background:var(--panel);border-radius:8px;font-size:.72rem;font-weight:600;color:var(--ink-2);display:flex;align-items:center;justify-content:center;gap:.25rem;}
  .cardacts button:hover{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-weak);}
  .cardacts button svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
  .cardacts .move{color:var(--accent-ink);background:var(--accent-weak);border-color:transparent;}
  .cardacts .icononly{flex:0 0 auto;min-width:2.1rem;padding:0 .5rem;}
  .cardacts .icononly svg{margin:0;}
  .convertzone{flex:0 0 158px;border:2px dashed var(--line-2);border-radius:12px;display:flex;align-items:center;justify-content:center;min-height:120px;background:transparent;align-self:stretch;}

  .convertzone .cz-inner{text-align:center;color:var(--ink-3);padding:.5rem;}

  .convertzone .cz-t{font-size:.8rem;font-weight:700;color:var(--accent-ink);margin-top:.3rem;}
  .convertzone .cz-s{font-size:.68rem;margin-top:.15rem;}
  .p-head .phdr-ext{border:1px solid var(--line-2);background:var(--panel);border-radius:8px;min-width:2.2rem;min-height:2.2rem;display:grid;place-items:center;color:var(--accent-ink);margin-left:auto;}
  .p-head .phdr-ext svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
  .qedit{border-bottom:1px dashed var(--accent);color:var(--accent-ink);cursor:text;outline:none;}
  .qedit:focus{background:var(--accent-weak);border-radius:4px;}
  .cardacts .winback{flex:2;color:#fff;background:var(--accent);border-color:var(--accent);}

  /* ---------- customer read-only grid ---------- */
  .roinfo{display:flex;align-items:center;gap:.45rem;margin:.8rem .9rem 0;font-size:.78rem;color:var(--ink-2);background:var(--accent-weak);border:1px solid #dcdcfa;color:var(--accent-ink);border-radius:10px;padding:.5rem .7rem;}
  .roinfo svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
  .cust-filter{display:flex;gap:.4rem;flex-wrap:wrap;padding:.7rem .9rem .2rem;}
  .cust-filter button{border:1px solid var(--line-2);background:var(--panel);border-radius:2rem;padding:.3rem .7rem;font-size:.74rem;font-weight:600;color:var(--ink-2);min-height:2rem;}
  .cust-filter button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.6rem;padding:.7rem .9rem 1rem;}
  .stagebadge{font-size:.64rem;font-weight:700;padding:.1rem .45rem;border-radius:1rem;}

  /* ---------- Today ---------- */
  .today{padding:1rem;overflow:auto;height:100%;}
  .today h2{font-size:1.15rem;margin-bottom:.15rem;}
  .today .sub{color:var(--ink-3);font-size:.82rem;margin-bottom:1rem;}
  .tsec{margin-bottom:1.1rem;}
  .tsec .th{display:flex;align-items:center;gap:.45rem;font-size:.8rem;font-weight:700;color:var(--ink);margin-bottom:.5rem;}
  .tsec .th .cnt{color:var(--ink-3);font-weight:600;}
  .tsec .th .ic{width:1.5rem;height:1.5rem;border-radius:7px;display:grid;place-items:center;}
  .tsec .th .ic svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;}
  .tcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:var(--sh);padding:.6rem .7rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.6rem;}
  .tcard .tx{flex:1;min-width:0;}
  .tcard .tx .n{font-size:.86rem;font-weight:600;}
  .tcard .tx .m{font-size:.75rem;color:var(--ink-2);margin-top:.1rem;}
  .tcard .go{border:1px solid var(--line-2);background:var(--panel);border-radius:8px;min-height:2.1rem;padding:0 .7rem;font-size:.74rem;font-weight:600;color:var(--accent-ink);}
  .tcard .chk{flex:0 0 auto;width:1.5rem;height:1.5rem;border-radius:6px;border:2px solid var(--line-2);background:#fff;display:grid;place-items:center;font-size:.8rem;color:#fff;font-weight:800;}
  .tcard .chk.on{background:var(--accent);border-color:var(--accent);}
  .tcard.task.done .n{text-decoration:line-through;color:var(--ink-3);}
  .duetag{font-size:.66rem;font-weight:700;padding:.05rem .4rem;border-radius:1rem;}
  .duetag.over{background:var(--red-w);color:#b23636;} .duetag.today{background:var(--accent-weak);color:var(--accent-ink);} .duetag.soon{background:var(--bg);color:var(--ink-3);}
  /* KPI board */
  .kpi{padding:1rem;overflow:auto;height:100%;}
  .kpi-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .kpi-top h2{font-size:1.15rem;} .kpi-top .sub{color:var(--ink-3);font-size:.82rem;}
  .periodtog,.lbtog{display:inline-flex;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:var(--panel);}
  .periodtog button,.lbtog button{border:0;background:transparent;padding:.4rem .7rem;font-size:.76rem;font-weight:600;color:var(--ink-2);min-height:2.3rem;}
  .periodtog button.on,.lbtog button.on{background:var(--accent);color:#fff;}
  .lbtog{margin-left:auto;} .lbtog button{min-height:2rem;padding:.3rem .6rem;font-size:.72rem;}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.7rem;margin:.9rem 0;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);padding:.8rem .9rem;}
  .stat .lab{font-size:.68rem;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .stat .big{font-size:1.8rem;font-weight:800;margin-top:.15rem;line-height:1;}
  .stat .tgt{font-size:.72rem;color:var(--ink-2);margin-top:.35rem;line-height:1.35;}
  .stat.good{border-left:3px solid var(--green);} .stat.bad{border-left:3px solid var(--red);background:#fdf7f7;}
  .stat.click{cursor:pointer;transition:.12s;} .stat.click:hover{border-color:var(--accent);box-shadow:var(--sh-2);}
  .stat.click .lab{color:var(--accent-ink);}
  .od-banner{display:flex;align-items:center;gap:.4rem;background:var(--red-w);border:1px solid #f0c9c9;color:#b23636;border-radius:10px;padding:.6rem .8rem;font-size:.82rem;margin-bottom:.8rem;cursor:pointer;}
  .od-banner svg{width:15px;height:15px;fill:#b23636;stroke:none;flex:0 0 auto;}
  .od-banner span{color:var(--ink-2);font-weight:600;margin-left:.2rem;}
  .kcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);padding:.85rem .95rem;margin-bottom:.8rem;}
  .kh{font-size:.82rem;font-weight:700;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem;}
  .kh span{color:var(--ink-3);font-weight:500;}
  .knote{font-size:.72rem;color:var(--ink-3);margin-top:.55rem;}
  .bar-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;}
  .bar-row .bl{font-size:.78rem;color:var(--ink-2);flex:0 0 38%;}
  .bar-row .bt{flex:1;height:9px;background:#eee;border-radius:5px;overflow:hidden;}
  .bar-row .bt i{display:block;height:100%;border-radius:5px;}
  .bar-row .bv{font-size:.78rem;font-weight:700;width:44px;text-align:right;}
  .mom{display:flex;align-items:flex-end;gap:.6rem;height:130px;padding-top:.5rem;}
  .mbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:.25rem;position:relative;}
  .mbar i{width:70%;background:linear-gradient(180deg,#6d6df3,#8b5cf6);border-radius:6px 6px 0 0;min-height:4px;}
  .mbar span{font-size:.68rem;color:var(--ink-3);} .mbar b{font-size:.7rem;font-weight:700;position:absolute;top:-.9rem;}
  .lb-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;}
  .lb-row .rk{font-size:.78rem;font-weight:800;color:var(--ink-3);width:1.1rem;}
  .lb-row .ln{flex:0 0 34%;font-size:.8rem;font-weight:600;}
  .lb-row .ln small{display:block;font-size:.68rem;color:var(--ink-3);font-weight:500;}
  .lb-row .lw{flex:1;height:9px;background:#eee;border-radius:5px;overflow:hidden;}
  .lb-row .lw i{display:block;height:100%;background:#3d7fe0;border-radius:5px;}
  .lb-row .lv{font-size:.78rem;font-weight:700;width:52px;text-align:right;}
  .lb-row.me{background:var(--accent-weak);border-radius:8px;padding:.3rem .4rem;margin:0 -.4rem .4rem;}
  .lb-row.me .lw i{background:var(--accent);}
  .lb-row .rk .rk-n{font-size:.72rem;font-weight:800;color:var(--ink-3);}
  .game{background:linear-gradient(135deg,#f4f4ff,#eef0ff);border:1px solid #dcdcfa;border-radius:10px;padding:.7rem .8rem;margin-bottom:.8rem;}
  .game.lead{background:linear-gradient(135deg,#fff7e8,#fdf0d6);border-color:#f0dcae;}
  .game .gt{font-size:.72rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--accent-ink);}
  .game.lead .gt{color:#9a6a12;}
  .game .gm{font-size:.9rem;color:var(--ink);margin:.25rem 0 .5rem;}
  .game .gbar{height:8px;background:#fff;border-radius:5px;overflow:hidden;border:1px solid #dcdcfa;}
  .game .gbar i{display:block;height:100%;background:linear-gradient(90deg,#6d6df3,#8b5cf6);border-radius:5px;}
  .game .gpct{font-size:.68rem;color:var(--ink-3);margin-top:.3rem;}

  /* ---------- mobile board ---------- */
  .mob-boardbar{display:none;gap:.4rem;padding:.55rem .7rem;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);}
  .mob-boardbar button{flex:0 0 auto;border:1px solid var(--line-2);background:var(--panel);border-radius:2rem;padding:.35rem .8rem;font-size:.76rem;font-weight:600;color:var(--ink-2);min-height:2.3rem;}
  .mob-boardbar button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .stagestrip{display:none;gap:.4rem;padding:.55rem .7rem;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--line);}
  .stagestrip button{flex:0 0 auto;border:1px solid var(--line-2);background:var(--panel);border-radius:2rem;padding:.3rem .75rem;font-size:.75rem;font-weight:600;color:var(--ink-2);min-height:2.2rem;display:flex;align-items:center;gap:.35rem;}
  .stagestrip button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .stagestrip .pill{background:rgba(0,0,0,.08);border-radius:1rem;padding:0 .35rem;font-size:.66rem;}
  .stagestrip button.on .pill{background:rgba(255,255,255,.25);}
  .mobcol{display:none;padding:.8rem;flex-direction:column;gap:.6rem;overflow-y:auto;height:100%;}
  .mobcol .empty{color:var(--ink-3);font-size:.82rem;text-align:center;border:1px dashed var(--line-2);border-radius:12px;padding:1.8rem 1rem;}

  /* ---------- detail panel ---------- */
  .panel{position:absolute;top:0;right:0;height:100%;width:440px;max-width:100%;background:var(--panel);box-shadow:-14px 0 40px rgba(16,17,21,.13);transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:30;display:flex;flex-direction:column;border-left:1px solid var(--line);}
  .panel.open{transform:translateX(0);}
  .p-head{padding:.9rem 1rem;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:.6rem;}
  .p-head .x{border:0;background:var(--bg);border-radius:8px;min-width:2.2rem;min-height:2.2rem;font-size:1.1rem;color:var(--ink-2);}
  .p-head .who{font-size:1.1rem;font-weight:650;}
  .p-head .where{font-size:.82rem;color:var(--ink-2);}
  .p-head .obj{font-size:.62rem;font-weight:700;color:var(--accent-ink);background:var(--accent-weak);border-radius:1rem;padding:.1rem .45rem;margin-top:.35rem;display:inline-block;}
  .p-body{overflow:auto;padding:1rem;flex:1;}
  .p-sec{margin-bottom:1.1rem;}
  .p-sec .lbl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:.5rem;}
  .kv{display:flex;justify-content:space-between;gap:1rem;padding:.4rem 0;border-bottom:1px solid var(--line);font-size:.83rem;}
  .kv .k{color:var(--ink-2);} .kv .v{font-weight:600;text-align:right;}
  .kv .v.edit{color:var(--accent-ink);cursor:text;border-bottom:1px dashed var(--accent);}
  .journey{display:flex;align-items:center;gap:.25rem;}
  .journey .st{flex:1;text-align:center;font-size:.6rem;font-weight:600;color:var(--ink-3);}
  .journey .st .b{height:5px;border-radius:3px;background:var(--line-2);margin-bottom:.3rem;}
  .journey .st.done .b{background:var(--accent);} .journey .st.done{color:var(--accent-ink);}
  .journey .st.cur .b{background:var(--accent);} .journey .st.cur{color:var(--ink);}
  .tl{position:relative;padding-left:1rem;}
  .tl .ev{position:relative;padding:0 0 .7rem .3rem;border-left:2px solid var(--line-2);margin-left:.2rem;}
  .tl .ev:last-child{border-left-color:transparent;}
  .tl .ev::before{content:'';position:absolute;left:-5px;top:2px;width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .tl .ev .t{font-size:.8rem;font-weight:600;} .tl .ev .d{font-size:.72rem;color:var(--ink-3);}
  .voicerow{display:flex;align-items:center;gap:.55rem;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:.5rem .6rem;font-size:.8rem;}
  .voicerow .pl{width:1.9rem;height:1.9rem;border-radius:50%;background:var(--accent);display:grid;place-items:center;flex:0 0 auto;}
  .voicerow .pl svg{width:12px;height:12px;fill:#fff;}
  .qa{display:flex;gap:.5rem;}
  .qa button{flex:1;min-height:var(--tap);border:1px solid var(--line-2);background:var(--panel);border-radius:9px;font-size:.78rem;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:.35rem;}
  .qa button.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
  .qa button svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

  /* ---------- modal / sheet / recorder / toast ---------- */
  .scrim{position:absolute;inset:0;background:rgba(16,20,30,.42);display:none;align-items:center;justify-content:center;z-index:40;padding:1rem;}
  .scrim.show{display:flex;}
  #sheetHost{display:contents;}
  .sheet{background:#fff;border-radius:14px;width:100%;max-width:430px;max-height:100%;box-shadow:var(--sh-2);overflow:hidden;display:flex;flex-direction:column;}
  .sheet-h{display:flex;align-items:center;padding:.85rem 1rem;border-bottom:1px solid var(--line);}
  .sheet-h h3{font-size:1rem;display:flex;align-items:center;gap:.35rem;}
  .sheet-h h3 svg{width:16px;height:16px;flex:0 0 auto;fill:var(--accent);stroke:none;}
  .sheet-h .x{margin-left:auto;border:0;background:transparent;font-size:1.3rem;color:var(--ink-3);min-width:var(--tap);min-height:var(--tap);}
  .sheet-b{padding:1rem;overflow-y:auto;flex:1 1 auto;min-height:0;}
  .field{margin-bottom:.75rem;} .field label{display:block;font-size:.74rem;font-weight:600;color:var(--ink-2);margin-bottom:.3rem;}
  .field input,.field textarea{width:100%;border:1px solid var(--line-2);border-radius:9px;padding:.6rem;font-size:16px;font-family:inherit;background:var(--bg);}
  .field textarea{min-height:100px;resize:vertical;}
  .matchbox{display:flex;align-items:center;gap:.6rem;border:1px solid #cfe8d8;background:var(--green-w);border-radius:10px;padding:.6rem .7rem;font-size:.82rem;}
  .matchbox .conf{margin-left:auto;font-size:.68rem;font-weight:700;color:#1f7d54;background:#fff;border-radius:1rem;padding:.1rem .45rem;}
  .sheet-f{display:flex;gap:.5rem;justify-content:flex-end;padding:.85rem 1rem;border-top:1px solid var(--line);}
  .btn{border:1px solid var(--line-2);background:#fff;border-radius:9px;padding:0 1.1rem;min-height:var(--tap);font-weight:600;font-size:.85rem;color:var(--ink-2);}
  .btn.pri{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.grn{background:var(--green);border-color:var(--green);color:#fff;}
  .movelist{display:flex;flex-direction:column;gap:.4rem;}
  .movelist button{display:flex;align-items:center;gap:.55rem;border:1px solid var(--line);background:#fff;border-radius:9px;padding:.65rem .7rem;min-height:var(--tap);font-size:.85rem;font-weight:600;color:var(--ink);text-align:left;}

function openKpiModal(kind,rev,plabel){

    const max=Math.max(1,...data.map(d=>d.amt));
    title='Open pipeline — by stage';
    body=data.map(d=>`<div class="bar-row"><span class="bl">${d.l} · ${d.n}</span><span class="bt"><i style="width:${d.amt/max*100}%;background:${d.c}"></i></span><span class="bv">${fmtK(d.amt)}</span></div>`).join('')
      +`<div class="knote" style="margin-top:.6rem">Total open pipeline: <b>${fmtK(data.reduce((a,d)=>a+d.amt,0))}</b> across ${data.reduce((a,d)=>a+d.n,0)} opps</div>`;
  } else if(kind==='over'){
    const od=R.filter(r=>r.board==='opportunity'&&r.pastClose);
    title='Opportunities past close date';
    body=`<div class="movelist">${od.map(r=>`<button data-openid="${r.id}"><span class="dot" style="background:var(--red)"></span>${r.doctor} · ${r.practice}<small>close ${r.close} · ${r.amount}</small></button>`).join('')}</div>
      <div class="knote" style="margin-top:.6rem">KPI target is 0 — update the close date or move each deal to its real stage.</div>`;
  }
  openSheet(`<div class="sheet"><div class="sheet-h"><h3>${title}</h3><button class="x" data-close>×</button></div><div class="sheet-b">${body}</div></div>`);
  sheetHost().querySelectorAll('[data-openid]').forEach(b=>b.onclick=()=>{closeSheet();openPanel(+b.dataset.openid);});
}

  'portfolio:working':{what:'Actively engaging — an activity was logged on the doctor in the last 30 days.',todo:['Keep the momentum going toward a first meeting.','You can also pull a contact here to actively target them.']},

  'opportunity:won':{what:'Signed — the customer moves into onboarding.',todo:['Hand off cleanly so onboarding starts fast.']},

function nudge(r){
  if(r.obj==='Lead'){
    if(r.stage==='new'){
      if(r.escore>=90)return['hot',r.hasActivity?'🔥 Wants contact — keep reaching out to book a meeting':'🔥 High interest — reach out now, repeatedly, to book a meeting'];
      if(!r.hasActivity)return['tip','Contact this lead and qualify the ortho fit'];
      return null;
    }
    if(r.stage==='qualifying')return['tip','Qualify the ortho fit, then convert or park'];
    return null;
  }
  if(r.obj==='Opportunity'){
    if(r.pastClose)return['bad','⚠ Close date has passed — update it'];
    if(!r.na)return null; // the red "No next activity" line already shows
    if(!r.p2p&&(r.stage==='odiscover'||r.stage==='consult'))return['tip','Invite the doctor to a Peer-to-Peer event — big conversion lever'];
    return null;
  }
  return null;
}

}

/* ---------- card ---------- */
function cardHTML(r){
  const o=contextOwner(r);
  const dealBadges=[];
  if(r.of==='sent')dealBadges.push('<span class="badge of">📄 Sent</span>');
  if(r.of==='viewed')dealBadges.push('<span class="badge ofv">👀 Viewed</span>');
  if(r.amount)dealBadges.push(`<span class="badge">${r.amount} · ${r.close}</span>`);
  if(r.stage==='odiscover'&&r.disc){const s=discScore(r.disc),g=discGrade(r.disc),gc=gradeColor(g);dealBadges.push(`<span class="discopill" style="background:${gc[0]};color:${gc[1]}" title="Discovery score">${IC.ai} ${s} · ${g}</span>`);}
  const leadMeta=r.obj==='Lead'
    ? `<div class="next" style="color:var(--ink-2)">${IC.arrow}<span>${r.position} · <b>${r.ortho}</b> cases/yr · ${r.dup?'<span style="color:var(--red);font-weight:700">⚠ dup</span>':'dup clear'}</span></div>
       <div class="next" style="color:var(--ink-3);margin-top:.2rem">Source: ${r.source} — ${r.sourceDetail}</div>`
    : '';
  // portfolio 3-criteria signals (segment shown as badge already) for New + Dormant
  let signals='';
  if(r.board==='portfolio'&&(r.stage==='newp'||r.stage==='dormant')){
    const near=oppCities().has(r.city),chips=[];
    if(near)chips.push('<span class="sig near">📍 Near pipeline</span>');
    if(r.engagement!=null)chips.push(`<span class="sig eng">⚡ Engagement ${r.engagement}</span>`);
    if(near&&r.engagement>=70)chips.push('<span class="sig fruit">★ Quick win</span>');
    signals=`<div class="row sigs">${chips.join('')}</div>`;
  }
  const naLine=r.obj==='Opportunity'?(r.na?`<div class="na-ok">${IC.cal} ${r.na.date} · ${r.na.subj}</div>`:`<div class="na-miss">${IC.warn} No next activity</div>`):'';
  const nud=nudge(r), nudLine=nud?`<div class="nudge ${nud[0]}">${nud[1]}</div>`:'';
  return `<div class="card" data-id="${r.id}" draggable="true">
    <span class="owner ${o.role}" title="${o.role} · ${o.name} (Salesforce photo)">${o.initials}</span>
    <div class="row" style="margin-top:0;margin-bottom:.35rem">${segBadge(r.seg)}</div>
    <div class="who">${r.doctor}</div>
    <div class="where">${r.practice}</div>
    ${leadMeta}
    ${signals}
    ${dealBadges.length?`<div class="row">${dealBadges.join('')}</div>`:''}
    ${naLine}
    ${nudLine}
    <div class="card-open">Open ${IC.arrow}</div></div>`;
}

/* ---------- render dispatch ---------- */
function render(){
  const b=BOARDS[S.board];
  el('boardTitle').firstChild.textContent=b.name;
  el('boardSub').textContent=b.sub;
  renderRail();
  // reset visibility
  surface.style.display='';mobcol.style.display='';el('stagestrip').style.display='';
  if(b.type==='today'){renderToday();return;}
  if(b.type==='customer'){renderCustomer();return;}
  if(b.type==='reactivation'){renderReactivation();return;}
  if(b.type==='kpi'){renderKPI();return;}
  if(b.type==='leaderboard'){renderLeaderboard();return;}
  renderKanban();

/* ---------- Kanban (lead/portfolio/opportunity) ---------- */
function renderKanban(){
  const b=BOARDS[S.board];
  const cols=b.cols;
  surface.innerHTML='';
  const board=document.createElement('div');board.className='board';
  cols.forEach((col)=>{
    const list=sortCol(R.filter(r=>r.board===S.board&&r.stage===col.id&&matches(r)),col.id);
    const collapsed=col.archive&&!S.expanded.includes(col.id);
    const key=S.board+':'+col.id;
    const c=document.createElement('div');c.className='col'+(collapsed?' collapsed':'');c.dataset.stage=col.id;
    let bodyInner='';
    if(collapsed){
      bodyInner=`<button class="expandbtn" data-exp="${col.id}">View ${list.length} ${list.length===1?'lead':'leads'} ›</button>`;
    } else if(col.swim){
      col.swim.forEach(sw=>{const sub=list.filter(r=>r.momentum===sw);
        bodyInner+=`<div class="swimhead"><span class="s" style="background:${col.c}"></span>${sw} · ${sub.length}</div>`+sub.map(cardHTML).join('');});
    } else {
      bodyInner=(col.archive?`<button class="collapsebtn" data-col="${col.id}">▲ Collapse</button>`:'')+(list.length?list.map(cardHTML).join(''):`<div class="col-empty">Nothing here yet</div>`);
    }
    c.innerHTML=`<div class="col-h"><span class="dot" style="background:${col.c}"></span><span class="nm">${col.label}</span>
      ${col.auto?'<span class="auto">AUTO</span>':''}${col.target?'<span class="auto" style="background:var(--green-w);color:#1f7d54">TARGET</span>':''}${col.archive?'<span class="auto" style="background:var(--bg);color:var(--ink-3)">PARKED</span>':''}<span class="ct">${list.length}</span>

    board.appendChild(z);
  }
  surface.appendChild(board);
  wireDrag();wireActions(surface);wireCardClick(surface);wireInfo(surface);
  surface.querySelectorAll('[data-exp]').forEach(x=>x.onclick=e=>{e.stopPropagation();S.expanded.push(x.dataset.exp);render();});
  surface.querySelectorAll('[data-col]').forEach(x=>x.onclick=e=>{e.stopPropagation();S.expanded=S.expanded.filter(id=>id!==x.dataset.col);render();});

  if(!S.stage||!cols.find(c=>c.id===S.stage))S.stage=cols[0].id;
  el('stagestrip').innerHTML=cols.map(col=>{
    const n=R.filter(r=>r.board===S.board&&r.stage===col.id&&matches(r)).length;
    return `<button data-s="${col.id}" class="${col.id===S.stage?'on':''}"><span style="width:.5rem;height:.5rem;border-radius:50%;background:${col.c};display:inline-block"></span>${col.label}<span class="pill">${n}</span></button>`;
  }).join('');
  el('stagestrip').querySelectorAll('button').forEach(bt=>bt.onclick=()=>{S.stage=bt.dataset.s;render();});
  const col=cols.find(c=>c.id===S.stage);
  const list=sortCol(R.filter(r=>r.board===S.board&&r.stage===S.stage&&matches(r)),S.stage);
  let mh='';

/* ---------- drag ---------- */
let dragId=null;
function wireDrag(){
  surface.querySelectorAll('.card[draggable]').forEach(c=>{
    c.addEventListener('dragstart',()=>{dragId=+c.dataset.id;c.classList.add('dragging');});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragId=null;surface.querySelectorAll('.col').forEach(x=>x.classList.remove('dropok'));});
  });
  surface.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dropok');});
    col.addEventListener('dragleave',()=>col.classList.remove('dropok'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('dropok');if(!dragId)return;
      if(col.dataset.convert){const r=R.find(x=>x.id===dragId);if(r&&r.obj==='Lead')openConvert(r);else toast('Only leads can be converted here');}
      else attemptMove(dragId,col.dataset.stage);});
  });
}

/* ---------- drag drop move (mirrors tap-move) ---------- */
function attemptMove(id,toStage){
  const r=R.find(x=>x.id===id);if(!r||r.stage===toStage)return;
  const tc=(BOARDS[r.board].cols||[]).find(c=>c.id===toStage);
  if(tc&&tc.noManual)return toast(`${tc.label} is set automatically — can't move here`);
  if(r.board==='portfolio'&&toStage==='discover')return openDiscover(r);
  if(r.board==='opportunity'&&toStage==='won'){r.board='customer';r.obj='Account';r.custStage='Onboarding';r.musp=0;r.fsPct=null;r.snap=0;r.market='Below';r.sow=0;r.seg='E4';delete r.momentum;render();return toast(`${r.practice} won — now onboarding`);}
  if(r.board==='opportunity'&&toStage==='close')return openCloseCat(r);
  r.stage=toStage;
  render();toast(`${r.doctor} moved`);
}
function openCloseCat(r){
  openSheet(`<div class="sheet"><div class="sheet-h"><h3>Close — pick a category</h3><button class="x" data-close>×</button></div>
    <div class="sheet-b"><p style="margin:0 0 .8rem;color:var(--ink-2);font-size:.85rem">Close isn't one stage — choose how the deal is tracking. This sets the swimlane.</p>
    <div class="movelist">${['Red Hot','On Hold'].map(sw=>`<button data-cc="${sw}"><span class="dot" style="background:#e07800"></span>${sw}${r.momentum===sw?'<small>current</small>':''}</button>`).join('')}</div></div></div>`);
  sheetHost().querySelectorAll('[data-cc]').forEach(b=>b.onclick=()=>{r.stage='close';r.momentum=b.dataset.cc;closeSheet();render();toast(`${r.doctor} → Close · ${r.momentum}`);});
}

/* ---------- move / graduation ---------- */
function openMove(r){
  const b=BOARDS[r.board];let opts='';
  if(r.board==='lead'){
    b.cols.forEach(c=>{if(c.id!==r.stage)opts+=optBtn(c.c,c.label,r.id,'lead:'+c.id);});
    opts+=optBtn('var(--accent)','Convert → Sales Portfolio',r.id,'convert',true,'creates Contact');
  } else if(r.board==='portfolio'){
    b.cols.forEach(c=>{if(c.id===r.stage||c.noManual)return;
      if(c.id==='discover')opts+=optBtn(c.c,'Discover',r.id,'discover',true,'creates Opportunity');
      else opts+=optBtn(c.c,c.label,r.id,'portfolio:'+c.id);});
  } else if(r.board==='opportunity'){
    b.cols.forEach(c=>{
      if(c.id===r.stage&&c.id!=='close')return;
      if(c.id==='close'){
        ['Red Hot','On Hold'].forEach(sw=>{
          if(r.stage==='close'&&r.momentum===sw)return;
          opts+=optBtn('#e07800','Close · '+sw,r.id,'close:'+sw,false,r.stage==='close'?'switch':'Close phase');
        });
      } else if(c.id==='won'){opts+=optBtn(c.c,'Closed Won',r.id,'won',true,'→ Customer');}
      else opts+=optBtn(c.c,c.label,r.id,'opp:'+c.id);
    });
    opts+=optBtn('#9aa0aa','← Back to Portfolio',r.id,'toportfolio',false,'de-stage deal');
  }
  openSheet(`<div class="sheet"><div class="sheet-h"><h3>Move ${r.doctor}</h3><button class="x" data-close>×</button></div>
    <div class="sheet-b"><div class="movelist">${opts}</div></div></div>`);
  sheetHost().querySelectorAll('[data-mv]').forEach(bt=>bt.onclick=()=>{doMove(r,bt.dataset.mv);});
}
function optBtn(c,label,id,mv,grad,note){return `<button data-mv="${mv}" class="${grad?'grad':''}"><span class="dot" style="background:${c}"></span>${label}${note?`<small>${note}</small>`:''}</button>`;}
function doMove(r,mv){
  if(mv==='convert'){closeSheet();return openConvert(r);}
  if(mv==='discover'){closeSheet();return openDiscover(r);}
  if(mv==='won'){closeSheet();r.board='customer';r.obj='Account';r.custStage='Onboarding';r.musp=0;r.fsPct=null;r.snap=0;r.market='Below';r.sow=0;r.seg='E4';delete r.momentum;render();return toast(`${r.practice} won — now onboarding in Customer Portfolio`);}
  if(mv==='toportfolio'){closeSheet();return moveBackToPortfolio(r);}
  if(mv.startsWith('close:')){r.stage='close';r.momentum=mv.slice(6);closeSheet();render();return toast(`${r.doctor} → Close · ${r.momentum}`);}
  if(mv.startsWith('mom:')){r.momentum=mv.slice(4);}
  else if(mv.startsWith('lead:'))r.stage=mv.slice(5);
  else if(mv.startsWith('portfolio:'))r.stage=mv.slice(10);
  else if(mv.startsWith('opp:')){r.stage=mv.slice(4);if(r.stage==='close'&&!r.momentum)r.momentum='On Hold';}
  closeSheet();render();toast(`${r.doctor} moved`);
}
function openConvert(r){

    <div class="sheet-f"><button class="btn" data-close>Cancel</button><button class="btn grn" id="rsave" disabled>${isDisc?'Apply to discovery':'Attach note'}</button></div></div>`);
  const rec=el('rec'),rb=el('rb'),save=el('rsave');
  if(el('discWhat'))el('discWhat').onclick=openDiscRubric;
  rb.onclick=()=>{if(rec.classList.contains('on')){stopRec();rb.disabled=true;if(isDisc){save.disabled=true;judge();}}else startRec();};
  function judge(){
    const tg=extractTargets(r);
    const proj=Object.assign({},r.disc);tg.forEach(k=>proj[k]=proj[k]==='missing'?'partial':'complete');
    const before=discScore(r.disc),after=discScore(proj),afterG=discGrade(after),gc=gradeColor(afterG);
    const box=el('exbox');el('stt').textContent='Processing the call…';
    box.innerHTML=`<div class="judge"><div class="jstep" id="jstep"><span class="spin"></span> Transcribing call…</div><div class="transcript" id="tr"></div></div>`;
    const tr=el('tr');
    const lines=[['You','So walk me through where the current workflow slows you down.'],[r.doctor,'Honestly, the manual check-ins eat our chair time.'],['You','And what would success look like six months in?'],[r.doctor,'Fewer in-office visits, and more aligner starts.']];
    let i=0;const streamT=setInterval(()=>{
      if(i<lines.length){tr.insertAdjacentHTML('beforeend',`<div class="tline"><b>${lines[i][0]}:</b> ${lines[i][1]}</div>`);tr.scrollTop=tr.scrollHeight;i++;}
      else{clearInterval(streamT);stageJudge();}
    },600);
    function stageJudge(){
      el('jstep').innerHTML='<span class="spin"></span> AI judging your discovery…';
      setTimeout(()=>{
        el('jstep').innerHTML=`${IC.ai} What the AI captured`;
        const wrap=document.createElement('div');wrap.className='exbox';box.querySelector('.judge').appendChild(wrap);
        if(!tg.length){wrap.innerHTML='<div class="exrow">Discovery already strong — nothing new to add.</div>';return stageScore();}
        let di=0;const dimStream=setInterval(()=>{
          if(di<tg.length){const k=tg[di];wrap.insertAdjacentHTML('beforeend',`<div class="exrow reveal">✓ <b>${DIMLABEL[k]}</b> — ${INSIGHT[k]}</div>`);di++;}
          else{clearInterval(dimStream);stageScore();}
        },750);
      },800);
    }
    function stageScore(){
      const sc=document.createElement('div');sc.className='scorejump';
      sc.innerHTML=`<div class="sj-row">Discovery score <b id="sjn">${before}</b><span class="arrow">→</span><b>${after}</b><span class="sj-grade" style="background:${gc[0]};color:${gc[1]}">grade ${afterG}</span></div>
        ${discQuestions(proj).length?`<div class="sj-q"><div class="sj-qh">✨ Ask these in your next meeting</div>${discQuestions(proj).map(q=>`<div class="sj-qi">• ${q}</div>`).join('')}</div>`:''}`;
      box.querySelector('.judge').appendChild(sc);
      let n=before;const step=Math.max(1,Math.round((after-before)/16)||1);
      const cnt=setInterval(()=>{n=Math.min(after,n+step);const e=el('sjn');if(e)e.textContent=n;if(n>=after)clearInterval(cnt);},45);
      el('stt').textContent='AI analysis complete — apply it to the opportunity.';save.disabled=false;
    }
  }
  save.onclick=()=>{
    if(isDisc){const tg=extractTargets(r),before=discScore(r.disc);tg.forEach(k=>{r.disc[k]=r.disc[k]==='missing'?'partial':'complete';});const after=discScore(r.disc);closeSheet();openPanel(r.id);render();toast(`AI updated discovery: ${before} → ${after}/100 (grade ${discGrade(after)})`);}
    else{closeSheet();toast(`Voice note (${fmt(recS)}) attached to ${r.doctor}`);}
  };
  function startRec(){recS=0;rec.classList.add('on');el('stt').textContent='Recording… talk through your discovery call';el('exbox').innerHTML='';
    recT=setInterval(()=>{recS++;el('tm').textContent=fmt(recS);rec.querySelectorAll('.wave i').forEach(x=>x.style.height=(8+Math.random()*34)+'px');},250);}
}
function stopRec(){if(recT){clearInterval(recT);recT=null;}const rec=el('rec');if(rec){rec.classList.remove('on');const s=el('stt');if(s)s.textContent='Recorded. Attach or discard.';const sv=el('rsave');if(sv)sv.disabled=false;}}
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

/* ---------- toast ---------- */
let tT;function toast(m){const t=el('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2600);}

/* ---------- chrome wiring ---------- */
el('devSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  el('devSeg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  S.dev=b.dataset.dev;el('device').className='device '+S.dev;
  if(S.dev==='mobile'&&S.board==='lead')S.board='today'; // mobile leads with Today
  render();
});
el('search').oninput=e=>{S.search=e.target.value;buildSuggestions(e.target.value);render();};
el('search').addEventListener('blur',()=>setTimeout(()=>{el('searchSug').classList.remove('show');},180));
const SECLABEL={lead:'Leads',portfolio:'Portfolio',opportunity:'Opportunities',customer:'Customers'};
function buildSuggestions(q){
  const sug=el('searchSug');q=q.trim().toLowerCase();
  if(q.length<1){sug.classList.remove('show');return;}
  const hits=R.filter(r=>r.doctor.toLowerCase().includes(q)||r.practice.toLowerCase().includes(q)).slice(0,7);
  if(!hits.length){sug.innerHTML='<div class="sug-empty">No matches</div>';sug.classList.add('show');return;}
  sug.innerHTML=hits.map(r=>`<button class="sug-row" data-goid="${r.id}"><span class="sug-tx"><b>${r.doctor}</b><span>${r.practice}</span></span><span class="sug-sec">${SECLABEL[r.board]||'—'}</span></button>`).join('');
  sug.classList.add('show');
  sug.querySelectorAll('[data-goid]').forEach(b=>b.onclick=()=>{const r=R.find(x=>x.id===+b.dataset.goid);sug.classList.remove('show');el('search').value='';S.search='';S.board=r.board;S.expanded=[];S.stage=firstStage(r.board);render();openPanel(r.id);});
}
// populate city filter from preloaded data
function msSummary(key){const arr=key==='city'?S.cities:S.segs;if(!arr.length)return key==='city'?'All cities':'All';if(arr.length<=2)return arr.join(', ');return arr.length+(key==='city'?' cities':' segments');}
function buildMs(key){
  const arr=key==='city'?S.cities:S.segs;const pop=el(key==='city'?'cityPop':'segPop');
  const groups=key==='city'?[{options:CITIES}]:[{label:'Prospects',options:['P1','P2','P3','P4']},{label:'Customers',options:['E1','E2','E3','E4','E5']}];
  let h=`<button class="ms-all" data-all>All ${key==='city'?'cities':'segments'}</button>`;
  groups.forEach(g=>{if(g.label)h+=`<div class="ms-grp">${g.label}</div>`;g.options.forEach(o=>{h+=`<label class="ms-opt"><input type="checkbox" data-v="${o}" ${arr.includes(o)?'checked':''}><span>${o}</span></label>`;});});
  pop.innerHTML=h;
  pop.querySelector('[data-all]').onclick=e=>{e.stopPropagation();if(key==='city')S.cities=[];else S.segs=[];afterMs(key);};
  pop.querySelectorAll('input[data-v]').forEach(cb=>cb.onchange=()=>{let a=(key==='city'?S.cities:S.segs).slice();const v=cb.dataset.v;if(cb.checked){if(!a.includes(v))a.push(v);}else a=a.filter(x=>x!==v);if(key==='city')S.cities=a;else S.segs=a;afterMs(key);});
}
function afterMs(key){el(key==='city'?'citySum':'segSum').textContent=msSummary(key);el(key==='city'?'fltCity':'fltSeg').classList.toggle('active',(key==='city'?S.cities:S.segs).length>0);buildMs(key);render();}
function closeAllMs(){['cityPop','segPop'].forEach(id=>el(id).classList.remove('show'));}
['city','seg'].forEach(key=>{buildMs(key);const chip=el(key==='city'?'fltCity':'fltSeg'),pop=el(key==='city'?'cityPop':'segPop');
  chip.addEventListener('click',e=>{e.stopPropagation();if(pop.contains(e.target))return;const open=pop.classList.contains('show');closeAllMs();if(!open)pop.classList.add('show');});});
document.addEventListener('click',closeAllMs);
el('priSel').onchange=e=>{S.focus=e.target.value;el('fltPri').classList.toggle('active',S.focus!=='all');render();};

/* ---------- coach ---------- */
const CSTEPS=[
  {sel:'#rail, #mobBoardBar',t:'Eight boards, one app',b:'Today and your scoreboard (KPIs, Leaderboard) up top, then your pipeline in order: Leads → Portfolio → Opportunities → Customers → Reactivation. You never leave the workspace or open a Salesforce object directly.'},
  {bd:'lead',sel:'.colinfo',t:'Not sure what to do? Tap the ⓘ',b:'Every column has an ⓘ and a short reminder line. Tap the ⓘ for a plain "what this is" plus a ✓ Do this checklist. This is how you learn the process as you work — no training needed.'},
  {bd:'lead',sel:'.card, #mobcol .card',t:'Leads: who is this, and act fast',b:'A lead card shows who and where, their ortho volume, and whether it\'s a duplicate. A high engagement score means the lead wants contact — the card nudges you to reach out repeatedly until you book a meeting. Check for a duplicate first; any other valid lead should be contacted, then convert or qualify.'},
  {bd:'lead',sel:'.convertzone',t:'Drag to the Convert zone',b:'Drop a lead onto the Convert zone at the end to launch the guided convert flow. After that, deals graduate automatically — a converted lead moves to Portfolio, a contact you move to Discover opens an Opportunity, a win lands in Customers.'},
  {bd:'portfolio',sel:'.card, #mobcol .card',t:'Segment drives your focus',b:'On Portfolio and Opportunities the P1–P4 / E1–E5 badge is the segment — it drives sort order so your best-potential practices float to the top. New and Dormant cards also show "near pipeline", engagement and "quick win" signals to help you plan visits.'},
  {bd:'portfolio',open:{board:'portfolio'},sel:'#panel',t:'Everything lives in the panel',b:'Click any card for the full detail panel — journey, contact quick-edit, My notes (one private note you can edit any time), the ★ focus toggle, and the ↗ to open the record in Salesforce. All actions — Move, Email, Record — live here to keep the board clean.'},
  {bd:'opportunity',open:{board:'opportunity',stage:'odiscover'},sel:'.disco',t:'Opportunities + AI discovery',b:'This is a Discover-stage opportunity\'s panel: the Discovery Score and grade, every dimension, AI-suggested questions, and the recorder that fills them straight from your call — no questionnaires. Cards also nudge you to keep a next activity, fix a stale close date, or invite the doctor to a Peer-to-Peer event.'},
  {sel:'#search',t:'Search finds anything',b:'Search across Leads, Portfolio, Opps and Customers at once. Pick a suggestion and it jumps you straight to that record, wherever it lives.'},
  {bd:'kpi',sel:'.kpi-grid, #mobBoardBar [data-b="kpi"]',t:'Your KPIs, revenue-first',b:'Revenue leads, then Total Opps, Engagement Interactions and average per field day. Tap any number — revenue, a pipeline stage, an interaction type, a month — to see the list behind it.'},
  {bd:'leaderboard',sel:'.game, #mobBoardBar [data-b="leaderboard"]',t:'Leaderboard: how to climb',b:'See where you rank on Revenue and Engagement, by Sales Area or across your Global Region. Each metric tells you exactly what closes the gap to the next position.'},
  {sel:'#coachBtn',t:'Tour lives here',b:'Come back to this 🎓 button anytime. That\'s the whole app — go move some deals.'}
];
let ci=0;const cs=el('cs'),cring=el('cring'),cpop=el('cpop');
function startCoach(){ci=0;cs.classList.add('show');cstep();}
function cstep(){const st=CSTEPS[ci];
  if(st.bd&&S.board!==st.bd){S.board=st.bd;S.expanded=[];S.stage=firstStage(st.bd);closePanel();render();}
  el('cStep').textContent=`Step ${ci+1} of ${CSTEPS.length}`;el('cTitle').textContent=st.t;el('cBody').textContent=st.b;
  el('cBack').style.visibility=ci?'visible':'hidden';el('cNext').textContent=ci===CSTEPS.length-1?'Done':'Next';
  let delay=0;
  if(st.open){const o=R.find(r=>r.board===st.open.board&&(!st.open.stage||r.stage===st.open.stage));if(o){openPanel(o.id);delay=340;}}
  else if(el('panel').classList.contains('open')){closePanel();}
  setTimeout(cplace,delay);
}
function cplace(){const st=CSTEPS[ci];
  const sel=st.sel.split(',').map(s=>s.trim()).find(s=>document.querySelector(s))||st.sel.split(',')[0].trim();
  const t=document.querySelector(sel);
  if(t){const r=t.getBoundingClientRect(),p=6,w=Math.min(300,innerWidth*0.86);
    cring.style.display='block';
    cring.style.top=(r.top-p)+'px';cring.style.left=(r.left-p)+'px';cring.style.width=(r.width+2*p)+'px';cring.style.height=(r.height+2*p)+'px';
    let left,top;
    if(r.left>innerWidth*0.5){ // highlight is on the right (e.g. the panel) → put popup on the left
      left=24;top=Math.min(Math.max(16,r.top),innerHeight-240);
    } else {
      left=Math.min(Math.max(8,r.left),innerWidth-w-8);
      top=r.bottom+12;if(top+200>innerHeight)top=Math.max(8,r.top-200);
    }
    cpop.style.top=top+'px';cpop.style.left=left+'px';t.scrollIntoView({block:'nearest'});}
  else{cring.style.display='none';cpop.style.top='50%';cpop.style.left='50%';}
}
el('coachBtn').onclick=startCoach;el('cSkip').onclick=()=>cs.classList.remove('show');
el('cBack').onclick=()=>{if(ci){ci--;cstep();}};el('cNext').onclick=()=>{if(ci<CSTEPS.length-1){ci++;cstep();}else cs.classList.remove('show');};
addEventListener('resize',()=>{if(cs.classList.contains('show'))cstep();});

/* init */
S.stage=firstStage(S.board);render();
</script>
</body>
